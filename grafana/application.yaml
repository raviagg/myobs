apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-myobs-grafana
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/raviagg/myobs
    targetRevision: main
    path: grafana

  destination:
    server: https://kubernetes.default.svc
    namespace: ns-myobs

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
